<svg viewBox="0 0 480 900" xmlns="http://www.w3.org/2000/svg" font-family="Manrope,Arial,sans-serif">
  <rect width="480" height="900" fill="#f8f5ef"/>
  <!-- ===== dimension lines (gold) ===== -->
  <g stroke="#9c7a3c" stroke-width="2" fill="none">
    <line x1="150" y1="60" x2="400" y2="60"/>
    <line x1="150" y1="52" x2="150" y2="68"/><line x1="400" y1="52" x2="400" y2="68"/>
    <line x1="112" y1="100" x2="112" y2="800"/>
    <line x1="104" y1="100" x2="120" y2="100"/><line x1="104" y1="800" x2="120" y2="800"/>
  </g>
  <text x="275" y="44" text-anchor="middle" font-size="26" font-weight="800" fill="#6b5320" letter-spacing="1">4100</text>
  <text x="88" y="450" text-anchor="middle" font-size="26" font-weight="800" fill="#6b5320" letter-spacing="1" transform="rotate(-90 88 450)">11600</text>

  <!-- ===== room fills ===== -->
  <g fill="#efe6d6" stroke="none">
    <rect x="150" y="100" width="250" height="700"/>
    <rect x="350" y="100" width="60" height="40"/>  <!-- ac bump -->
  </g>

  <!-- ===== furniture (thin gold) ===== -->
  <g fill="none" stroke="#b08a4a" stroke-width="1.6" stroke-linejoin="round">
    <!-- Bedroom 1 double bed -->
    <rect x="168" y="118" width="118" height="92" rx="3"/>
    <rect x="168" y="118" width="118" height="20"/>           <!-- headboard -->
    <line x1="200" y1="138" x2="200" y2="210"/><line x1="254" y1="138" x2="254" y2="210"/> <!-- pillow split -->
    <path d="M168 175 L286 158"/>                              <!-- duvet fold -->
    <!-- wardrobe beside bed -->
    <rect x="296" y="118" width="46" height="78"/>
    <line x1="296" y1="137" x2="342" y2="137"/><line x1="296" y1="157" x2="342" y2="157"/><line x1="296" y1="177" x2="342" y2="177"/>
    <!-- A/C unit -->
    <path d="M356 118 l22 -8 M356 126 l22 -8"/>
    <!-- Bath 2: basin + toilet -->
    <rect x="360" y="150" width="30" height="13" rx="3"/>
    <ellipse cx="375" cy="188" rx="11" ry="14"/><rect x="366" y="172" width="18" height="8" rx="2"/>
    <!-- Reading room single bed -->
    <rect x="320" y="248" width="72" height="96" rx="3"/>
    <rect x="320" y="248" width="72" height="16"/>
    <path d="M320 300 L392 285"/>
    <!-- Living: window (left wall) -->
    <path d="M150 470 l0 80 M156 470 l0 80"/>
    <!-- Living sofa (right) -->
    <rect x="344" y="470" width="48" height="92" rx="8"/>
    <rect x="350" y="476" width="36" height="80" rx="6"/>
    <!-- Kitchen: small round table + stool -->
    <circle cx="258" cy="628" r="16"/><circle cx="230" cy="650" r="9"/>
    <!-- Kitchen counter (bottom) + sink + hob -->
    <rect x="262" y="680" width="130" height="26"/>
    <rect x="276" y="686" width="22" height="14" rx="2"/>     <!-- sink -->
    <circle cx="330" cy="693" r="5"/><circle cx="348" cy="693" r="5"/> <!-- hob -->
    <rect x="200" y="690" width="46" height="16"/>            <!-- lower counter left -->
    <!-- Bath 1: toilet + shower -->
    <ellipse cx="318" cy="760" rx="11" ry="14"/><rect x="309" y="744" width="18" height="8" rx="2"/>
    <rect x="335" y="744" width="40" height="40"/><path d="M335 744 l40 40"/> <!-- shower -->
  </g>

  <!-- ===== walls (gold) ===== -->
  <g fill="none" stroke="#9c7a3c" stroke-width="4.5" stroke-linejoin="miter">
    <rect x="150" y="100" width="250" height="700"/>
    <!-- ac ledge -->
    <path d="M350 100 l0 40 l60 0" stroke-dasharray="5 4" stroke-width="2.5"/>
    <line x1="350" y1="140" x2="410" y2="140"/>
  </g>
  <g fill="none" stroke="#a8854a" stroke-width="3">
    <!-- bedroom1 bottom wall + door gap -->
    <line x1="150" y1="300" x2="220" y2="300"/><line x1="280" y1="300" x2="350" y2="300"/>
    <!-- partition bedroom1 | bath2/reading (right column) -->
    <line x1="350" y1="140" x2="350" y2="250"/>
    <line x1="350" y1="210" x2="410" y2="210"/>  <!-- bath2 bottom -->
    <!-- reading room left wall + opening -->
    <line x1="280" y1="250" x2="280" y2="300"/>
    <line x1="280" y1="360" x2="280" y2="450"/>
    <line x1="280" y1="450" x2="410" y2="450"/>  <!-- reading/living divide right -->
    <!-- living | kitchen open (no wall) -->
    <!-- bottom: corridor/bath1 walls -->
    <line x1="150" y1="715" x2="300" y2="715"/><line x1="360" y1="715" x2="400" y2="715"/>
    <line x1="300" y1="715" x2="300" y2="800"/><line x1="360" y1="715" x2="360" y2="800"/>
  </g>
  <!-- doors (arcs) -->
  <g fill="none" stroke="#b08a4a" stroke-width="1.4">
    <path d="M222 300 A40 40 0 0 1 222 340"/><line x1="222" y1="300" x2="222" y2="340"/>
    <path d="M300 360 A36 36 0 0 0 336 396"/>
    <path d="M210 800 A38 38 0 0 1 248 762"/>
    <path d="M330 715 A30 30 0 0 1 360 745"/>
  </g>

  <!-- ===== labels ===== -->
  <g fill="#7a5e26" font-weight="700" text-anchor="middle">
    <text x="250" y="270" font-size="16">Bedroom 1</text>
    <text x="385" y="150" font-size="11">A/C</text>
    <text x="382" y="232" font-size="12">Bath 2</text>
    <text x="345" y="400" font-size="13">Reading</text>
    <text x="345" y="416" font-size="13">Room</text>
    <text x="250" y="540" font-size="14">Living Area</text>
    <text x="250" y="640" font-size="14">Kitchen</text>
    <text x="205" y="752" font-size="12">Corridor</text>
    <text x="330" y="800" font-size="12">Bath 1</text>
  </g>
</svg>
